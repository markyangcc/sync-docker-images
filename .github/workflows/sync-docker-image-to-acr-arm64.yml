name: Sync Docker Images to ACR (arm64)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'images_arm64.txt'
  workflow_dispatch:
    inputs:
      images:
        description: 'Specify image, format: nginx:latest (empty to sync from images_arm64.txt)'
        required: false

env:
  ALIYUN_REGISTRY: registry.cn-beijing.aliyuncs.com
  ALIYUN_NAMESPACE: ${{ secrets.ALIYUN_NAMESPACE }}
  TARGET_PLATFORM: linux/arm64
  IMAGES_FILE: images_arm64.txt  # Keep in sync with the filename in on.push.paths

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: ACR
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Login to Aliyun ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Sync images
        run: |
          set -e

          if [ -n "${{ github.event.inputs.images }}" ]; then
            IMAGES="${{ github.event.inputs.images }}"
          else
            IMAGES=$(grep -v '^#' "${{ env.IMAGES_FILE }}" | grep -v '^$' || true)
            if [ -z "$IMAGES" ]; then
              echo "✅ No images to sync in ${{ env.IMAGES_FILE }}, exit"
              exit 0
            fi
          fi

          SUCCESS=0
          FAIL=0

          while IFS= read -r image; do
            [ -z "$image" ] && continue

            IMAGE_NAME=$(echo "$image" | cut -d: -f1)
            IMAGE_TAG=$(echo "$image" | grep ':' | cut -d: -f2)
            IMAGE_TAG=${IMAGE_TAG:-unknown}

            TARGET_NAME=$(echo "$IMAGE_NAME" | awk -F'/' '{print $NF}')
            TARGET="${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${TARGET_NAME}:${IMAGE_TAG}-arm64"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📦 Pull: ${IMAGE_NAME}:${IMAGE_TAG} [${{ env.TARGET_PLATFORM }}]"
            echo "🎯 Push: ${TARGET}"

            if docker pull --platform ${{ env.TARGET_PLATFORM }} "${IMAGE_NAME}:${IMAGE_TAG}" && \
               docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${TARGET}" && \
               docker push "${TARGET}"; then
              echo "✅ Success: ${image}"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "❌ Failed: ${image}"
              FAIL=$((FAIL + 1))
            fi

            docker rmi "${IMAGE_NAME}:${IMAGE_TAG}" "${TARGET}" 2>/dev/null || true

          done <<< "$IMAGES"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Success: ${SUCCESS}  ❌ Failed: ${FAIL}"

          [ $FAIL -eq 0 ]